name: digia_moengage_plugin
description: >
  MoEngage CEP plugin for the Digia SDK.
  Bridges MoEngage self-handled in-app campaigns into Digia's rendering engine.
version: 1.0.0-beta.2
repository: https://github.com/Digia-Technology-Private-Limited/digia_moengage_plugin

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.20.0'

dependencies:
  flutter:
    sdk: flutter

  # Digia core — the DigiaCEPPlugin interface lives here.
  digia_engage: ^1.0.0-beta.2

  # MoEngage Flutter SDK
  moengage_flutter: ^10.5.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: DigiaMoEngagePlugin
